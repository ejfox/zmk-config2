# Enable split keyboard support
CONFIG_ZMK_SPLIT=y

# Enable USB
CONFIG_ZMK_USB=y

# BLE stability fix for macOS (Intel + Apple Silicon) and general reliability
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Increase bluetooth transmit power for better range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Set deep sleep to help conserve battery
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Disable RGB underglow to save battery for wireless use
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y
